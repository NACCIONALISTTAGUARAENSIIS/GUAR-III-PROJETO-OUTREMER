# ==============================================================================
# MOTOR DE GĘMEO DIGITAL (TIER GOVERNAMENTAL) - BRASÍLIA
# ==============================================================================

[generation]
# TWEAK RIGOROSO: Substitui o 1.414 genérico pelas escalas exatas do DF
scale = 1.33
scale_h = 1.33
scale_v = 1.15

# Datapack de 4064 blocos (Permite que Brasília fique no alto do planalto)
vertical_offset = -307

# Centro do mapa (Atual: Guará / EPTG / Águas Claras)
offset = [-15.8464, -47.9713]

[terrain]
enabled = true
# 0.05 é o ideal para o LiDAR e o Smootherstep de 5ş grau que implementamos
smoothing = 0.05

[buildings]
# Ativa os detalhes das áreas residenciais do Guará e Asa Sul
window_shutters = true
balconies = true
chimneys = true
roofs = true

